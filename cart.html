<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Paradise Nursery</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-green-700 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-bold">Paradise Nursery</h1>
                    <nav class="hidden md:flex space-x-4">
                        <a href="index.html" class="hover:text-green-200 transition-colors">Home</a>
                        <a href="products.html" class="hover:text-green-200 transition-colors">Products</a>
                        <a href="cart.html" class="text-green-200">Cart</a>
                    </nav>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="relative hover:text-green-200 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <h2 class="text-3xl font-bold text-gray-800 mb-8">Shopping Cart</h2>
        
        <!-- Cart Summary -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold">Order Summary</h3>
                <div class="text-right">
                    <p class="text-gray-600">Total Items: <span id="total-items" class="font-bold">0</span></p>
                    <p class="text-2xl font-bold text-green-600">Total: $<span id="total-price">0.00</span></p>
                </div>
            </div>
        </div>

        <!-- Cart Items -->
        <div id="cart-items" class="space-y-4">
            <!-- Cart items will be dynamically loaded here -->
        </div>

        <!-- Empty Cart Message -->
        <div id="empty-cart" class="text-center py-12">
            <svg class="w-24 h-24 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <h3 class="text-xl font-semibold text-gray-600 mb-2">Your cart is empty</h3>
            <p class="text-gray-500 mb-6">Add some beautiful plants to get started!</p>
            <a href="products.html" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                Continue Shopping
            </a>
        </div>

        <!-- Cart Actions -->
        <div id="cart-actions" class="mt-8 flex flex-col sm:flex-row gap-4 hidden">
            <a href="products.html" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg text-center transition-colors">
                Continue Shopping
            </a>
            <button onclick="checkout()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                Checkout
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-green-800 text-white py-8 mt-16">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Paradise Nursery. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
